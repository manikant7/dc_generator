<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Contract Generator</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a1f2e;
    --surface2: #242b3d;
    --border: #2d3548;
    --text: #e1e4e8;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --code-bg: #0d1117;
    --radius: 8px;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 16px; font-weight: 600; }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .input-row { display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap; }
  .input-row > * { flex: 1; min-width: 200px; }

  textarea, input[type="text"], input[type="number"] {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 0.9rem;
    font-family: var(--font-mono);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  textarea:focus, input:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 120px; }

  input[type="file"] { width: 100%; color: var(--text-dim); font-size: 0.9rem; padding: 8px 0; }
  input[type="file"]::file-selector-button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 12px;
    margin-right: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  input[type="file"]::file-selector-button:hover { background: var(--border); }
  input[type="number"] { max-width: 100px; }

  .inline-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 24px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-header h3 { font-size: 1rem; font-weight: 600; }
  .result-body { padding: 20px; }
  .result-body.hidden { display: none; }

  .split-container {
    display: flex;
    gap: 0;
    align-items: stretch;
    position: relative;
  }
  .split-panel {
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
  }
  .split-panel:first-child { margin-right: 0; }
  .split-panel:last-child { margin-left: 0; }

  .split-divider {
    width: 8px;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    background: transparent;
    transition: background 0.15s;
    margin: 0 4px;
    border-radius: 4px;
  }
  .split-divider:hover,
  .split-divider.active {
    background: var(--accent);
  }
  .split-divider::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 32px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.15s;
  }
  .split-divider:hover::after,
  .split-divider.active::after {
    background: var(--accent);
  }

  body.dragging {
    cursor: col-resize;
    user-select: none;
  }
  body.dragging .split-divider { background: var(--accent); }

  @media (max-width: 768px) {
    .split-container { flex-direction: column; }
    .split-divider { display: none; }
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .panel-header h4 { font-size: 0.85rem; color: var(--text-dim); font-weight: 500; }

  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    margin-left: 4px;
    transition: background 0.15s;
  }
  .btn-sm:hover { background: var(--border); }

  /* ===== Code Panel ===== */
  .code-panel {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    resize: vertical;
    min-height: 180px;
    max-height: 700px;
    background: var(--code-bg);
  }
  .code-panel::-webkit-resizer {
    border-width: 10px;
    border-style: solid;
    border-color: transparent var(--border) var(--border) transparent;
  }

  .code-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .code-toolbar label {
    font-size: 0.7rem;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    user-select: none;
  }
  .code-toolbar label input { accent-color: var(--accent); }

  .code-scroll {
    display: flex;
    overflow: auto;
    flex: 1;
  }

  .code-gutter {
    padding: 14px 0 14px 0;
    text-align: right;
    user-select: none;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--code-bg);
  }
  .code-gutter.hidden { display: none; }

  .code-gutter .ln {
    padding: 0 10px 0 8px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.55;
  }

  .code-body {
    padding: 14px 0 14px 0;
    flex: 1;
    min-width: 0;
    background: var(--code-bg);
  }
  .code-body .cl {
    padding: 0 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.55;
    white-space: pre;
    tab-size: 4;
  }
  .code-body.wrap .cl {
    white-space: pre-wrap;
    word-break: break-all;
  }

  .chip {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  .chip strong { color: var(--text); }

  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 16px;
    display: none;
    font-size: 0.9rem;
  }
  .error-msg.visible { display: block; }

  .warning-msg {
    background: rgba(210,153,34,0.1);
    border: 1px solid var(--orange);
    color: var(--orange);
    padding: 10px 14px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    font-size: 0.85rem;
  }

  .hidden { display: none !important; }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-green { background: var(--green); }
</style>
</head>
<body>
<div class="container">
  <h1>Data Contract Generator</h1>
  <p class="subtitle">Provide data (path, upload, or paste) &rarr; get Pydantic v2 models + pytest tests</p>

  <div class="error-msg" id="error-msg"></div>

  <div class="card">
    <h2>Input</h2>
    <div class="tabs">
      <button class="tab-btn active" data-tab="path">File Paths</button>
      <button class="tab-btn" data-tab="upload">Upload</button>
      <button class="tab-btn" data-tab="paste">Paste Data</button>
    </div>

    <div class="tab-content active" id="tab-path">
      <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px;">One file path per line</p>
      <div class="input-row" style="flex-direction:column;">
        <textarea id="file-paths" rows="3" placeholder="/path/to/users.json&#10;/path/to/employees.xml" spellcheck="false"></textarea>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn" id="generate-paths-btn">Generate</button>
          <span class="inline-label">
            Max records: <input type="number" id="max-records-path" min="1" value="" placeholder="all" />
          </span>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-upload">
      <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px;">Select one or more files</p>
      <div class="input-row" style="flex-direction:column;">
        <input type="file" id="file-upload" multiple />
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn" id="upload-btn">Upload &amp; Generate</button>
          <span class="inline-label">
            Max records: <input type="number" id="max-records-upload" min="1" value="" placeholder="all" />
          </span>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-paste">
      <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px;">Paste JSON, XML, or CSV content below</p>
      <div class="input-row" style="flex-direction:column;">
        <textarea id="raw-data" rows="6" placeholder='[{"id": 1, "name": "Alice"}, {"id": 2, "name": "Bob"}]' spellcheck="false"></textarea>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="model-name" placeholder="Model name (e.g. User)" style="max-width:200px;flex:initial;" />
          <select id="data-type" style="background:var(--code-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 14px;font-size:0.9rem;max-width:150px;">
            <option value="">Auto-detect</option>
            <option value="json">JSON</option>
            <option value="xml">XML</option>
            <option value="csv">CSV</option>
          </select>
          <button class="btn" id="paste-btn">Generate</button>
          <span class="inline-label">
            Max records: <input type="number" id="max-records-paste" min="1" value="" placeholder="all" />
          </span>
        </div>
      </div>
    </div>
  </div>

  <div id="output-area" class="hidden"></div>
</div>

<script>
  function $(id) { return document.getElementById(id); }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      $(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  function showError(msg) {
    const el = $('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError() {
    $('error-msg').classList.remove('visible');
  }

  function setLoading(loading) {
    ['generate-paths-btn', 'upload-btn', 'paste-btn'].forEach(id => {
      const btn = $(id);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Generating...';
      } else {
        btn.disabled = false;
        btn.textContent = id === 'generate-paths-btn' ? 'Generate' : id === 'upload-btn' ? 'Upload & Generate' : 'Generate';
      }
    });
  }

  function sanitizePath(p) { return p.replace(/[^a-zA-Z0-9_-]/g, '_').toLowerCase(); }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function buildCodePanel(code, prefix, idx) {
    const lines = code.split('\n');
    const id = `${prefix}-${idx}`;
    let gutterHtml = '';
    let bodyHtml = '';
    const maxDigits = String(lines.length).length;
    lines.forEach((line, i) => {
      const num = i + 1;
      gutterHtml += `<div class="ln" style="min-width:${maxDigits}ch">${num}</div>`;
      bodyHtml += `<div class="cl">${escapeHtml(line)}</div>`;
    });

    return `
      <div class="code-panel">
        <div class="code-toolbar">
          <label><input type="checkbox" class="wrap-cb" data-target="${id}"> Wrap</label>
          <label><input type="checkbox" class="line-cb" data-target="${id}" checked> Lines</label>
        </div>
        <div class="code-scroll">
          <div class="code-gutter" id="gutter-${id}">${gutterHtml}</div>
          <div class="code-body" id="body-${id}">${bodyHtml}</div>
        </div>
      </div>`;
  }

  function renderResults(data) {
    const area = $('output-area');
    area.classList.remove('hidden');
    let html = '';

    if (data.errors && data.errors.length > 0) {
      html += '<div class="warning-msg"><strong>Errors:</strong><br>';
      data.errors.forEach(e => { html += '&bull; ' + escapeHtml(e) + '<br>'; });
      html += '</div>';
    }

    if (data.results && data.results.length > 0) {
      data.results.forEach((r, idx) => {
        const safeName = sanitizePath(r.class_name);
        html += '<div class="result-card">';
        html += '<div class="result-header">';
        html += `<h3><span style="color:var(--accent)">${escapeHtml(r.class_name)}</span> <span class="badge">${escapeHtml(r.file_type.toUpperCase())}</span></h3>`;
        html += `<div><span class="chip"><strong>${r.record_count}</strong> records</span>`;
        html += ` <span class="chip">${escapeHtml(r.source_label)}</span></div>`;
        html += '</div><div class="result-body">';
        html += `<div class="split-container" data-split-id="split-${idx}">`;

        html += '<div class="split-panel"><div class="panel-header"><h4>Contract <span class="badge badge-green">.py</span></h4>'
          + `<div><button class="btn-sm copy-btn" data-code="${escapeHtml(r.contract_code)}">Copy</button>`
          + ` <a href="/download/${safeName}/${escapeHtml(r.contract_filename)}" class="btn-sm" style="text-decoration:none;display:inline-block;">Download</a></div></div>`
          + buildCodePanel(r.contract_code, 'contract', idx) + '</div>';

        html += `<div class="split-divider" data-split-id="split-${idx}"></div>`;

        html += '<div class="split-panel"><div class="panel-header"><h4>Tests <span class="badge badge-green">.py</span></h4>'
          + `<div><button class="btn-sm copy-btn" data-code="${escapeHtml(r.test_code)}">Copy</button>`
          + ` <a href="/download/${safeName}/${escapeHtml(r.test_filename)}" class="btn-sm" style="text-decoration:none;display:inline-block;">Download</a></div></div>`
          + buildCodePanel(r.test_code, 'test', idx) + '</div>';

        html += '</div></div></div>';
      });
    } else if (!data.errors || data.errors.length === 0) {
      html += '<div class="warning-msg">No results returned.</div>';
    }

    area.innerHTML = html;

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(this.dataset.code).then(() => {
          const orig = this.textContent;
          this.textContent = 'Copied!';
          setTimeout(() => { this.textContent = orig; }, 1500);
        });
      });
    });

    document.querySelectorAll('.wrap-cb').forEach(cb => {
      cb.addEventListener('change', function () {
        const body = document.getElementById('body-' + this.dataset.target);
        if (body) body.classList.toggle('wrap', this.checked);
      });
    });

    document.querySelectorAll('.line-cb').forEach(cb => {
      cb.addEventListener('change', function () {
        const gutter = document.getElementById('gutter-' + this.dataset.target);
        if (gutter) gutter.classList.toggle('hidden', !this.checked);
      });
    });

    initSplitters();
  }

  let splitDrag = null;

  function initSplitters() {
    document.querySelectorAll('.split-divider').forEach(div => {
      div.removeEventListener('mousedown', onSplitDown);
      div.addEventListener('mousedown', onSplitDown);
    });
  }

  function onSplitDown(e) {
    e.preventDefault();
    const divider = e.currentTarget;
    const container = divider.parentElement;
    const left = container.children[0];
    const right = container.children[2];
    if (!left || !right) return;

    const startX = e.clientX;
    const startLeft = left.getBoundingClientRect().width;

    splitDrag = { container, left, right, startX, startLeft };

    document.body.classList.add('dragging');
    document.addEventListener('mousemove', onSplitMove);
    document.addEventListener('mouseup', onSplitUp);
  }

  function onSplitMove(e) {
    if (!splitDrag) return;
    const { container, left, right, startX, startLeft } = splitDrag;
    const dx = e.clientX - startX;
    const containerW = container.getBoundingClientRect().width;
    if (containerW <= 0) return;

    let leftRatio = (startLeft + dx) / containerW;
    leftRatio = Math.max(0.2, Math.min(0.8, leftRatio));
    const rightRatio = 1 - leftRatio;

    left.style.flex = `${leftRatio} 1 0`;
    right.style.flex = `${rightRatio} 1 0`;
  }

  function onSplitUp() {
    splitDrag = null;
    document.body.classList.remove('dragging');
    document.removeEventListener('mousemove', onSplitMove);
    document.removeEventListener('mouseup', onSplitUp);
  }

  async function doGenerate(formData) {
    clearError();
    setLoading(true);
    $('output-area').classList.add('hidden');
    try {
      const resp = await fetch('/generate', { method: 'POST', body: formData });
      const data = await resp.json();
      if (!resp.ok) { showError(data.detail || 'Unknown error'); return; }
      renderResults(data);
    } catch (err) {
      showError('Network error: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  $('generate-paths-btn').addEventListener('click', () => {
    const paths = $('file-paths').value.trim();
    if (!paths) { showError('Please enter at least one file path'); return; }
    const maxR = $('max-records-path').value;
    const fd = new FormData();
    fd.append('file_paths', paths);
    if (maxR) fd.append('max_records', maxR);
    doGenerate(fd);
  });

  $('upload-btn').addEventListener('click', () => {
    const files = $('file-upload').files;
    if (!files.length) { showError('Please select at least one file'); return; }
    const maxR = $('max-records-upload').value;
    const fd = new FormData();
    for (const f of files) fd.append('files', f);
    if (maxR) fd.append('max_records', maxR);
    doGenerate(fd);
  });

  $('paste-btn').addEventListener('click', () => {
    const data = $('raw-data').value.trim();
    const model = $('model-name').value.trim();
    if (!data) { showError('Please paste some data'); return; }
    if (!model) { showError('Please enter a model name'); return; }
    const dataType = $('data-type').value;
    const maxR = $('max-records-paste').value;
    const fd = new FormData();
    fd.append('raw_data', data);
    fd.append('model_name', model);
    if (dataType) fd.append('data_type', dataType);
    if (maxR) fd.append('max_records', maxR);
    doGenerate(fd);
  });
</script>
</body>
</html>
